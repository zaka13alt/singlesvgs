<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassLink</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* Portal Main View */
        #portal-ui {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .action-btn {
            background-color: #222;
            color: #fff;
            border: 2px solid #444;
            padding: 15px 30px;
            font-size: 1.2rem;
            margin: 10px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background-color: #444;
            border-color: #fff;
        }

        /* Settings Gear Icon */
        #settings-trigger {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            z-index: 1000;
        }

        #settings-trigger:hover {
            color: #888;
        }

        /* Draggable Settings Container */
        #settings-container {
            position: absolute;
            top: 80px;
            right: 20px;
            background-color: #1a1a1a;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 15px;
            width: 250px;
            display: none; /* Hidden by default */
            flex-direction: column;
            gap: 10px;
            z-index: 1001;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        #settings-header {
            cursor: move;
            background-color: #333;
            padding: 10px;
            margin: -15px -15px 10px -15px;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .settings-btn {
            background-color: #333;
            color: #fff;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
            text-align: center;
        }

        .settings-btn:hover {
            background-color: #555;
        }

        /*  */
        #fullscreen-iframe {
            display: none;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            border: none;
            z-index: 2000;
            background-color: #000;
        }

        /*  */
        #back-btn {
            display: none;
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 2001;
            background-color: #ff3333;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
        }

        #back-btn:hover {
            background-color: #ff6666;
        }
    </style>
</head>
<body>

    <!--  -->
    <div id="portal-ui">
        <h1>Education</h1>
        <div>
            <button class="action-btn" onclick="loadContent('https://cdn.jsdelivr.net/gh/zaka13alt/history/working.svg')">Browser</button>
            <button class="action-btn" onclick="loadContent('https://esm.sh/gh/zaka13alt/dist/math/games.html')">Games</button>
        </div>
    </div>

   
    <button id="settings-trigger" onclick="toggleSettings()">⚙️</button>

    <!--  -->
    <div id="settings-container">
        <div id="settings-header">Settings (Drag to Move)</div>
        <button class="settings-btn" onclick="alert('Option 1 clicked!')">Theme Settings</button>
        <button class="settings-btn" onclick="alert('Option 2 clicked!')">Clear Cache</button>
        <button class="settings-btn" onclick="alert('Option 3 clicked!')">Account Info</button>
    </div>

    <!--  -->
    <button id="back-btn" onclick="goHome()">← Go Back</button>
    <iframe id="fullscreen-iframe" src=""></iframe>

    <script>
        // 
        function toggleSettings() {
            const settings = document.getElementById('settings-container');
            if (settings.style.display === 'none' || settings.style.display === '') {
                settings.style.display = 'flex';
            } else {
                settings.style.display = 'none';
            }
        }

        // 
        const settingsContainer = document.getElementById('settings-container');
        const settingsHeader = document.getElementById('settings-header');
        let offsetX = 0, offsetY = 0, isDragging = false;

        settingsHeader.onmousedown = function(e) {
            e.preventDefault();
            isDragging = true;
            offsetX = e.clientX - settingsContainer.getBoundingClientRect().left;
            offsetY = e.clientY - settingsContainer.getBoundingClientRect().top;
            
            document.addEventListener('mousemove', elementDrag);
            document.addEventListener('mouseup', stopDrag);
        };

        function elementDrag(e) {
            if (!isDragging) return;
            settingsContainer.style.left = (e.clientX - offsetX) + 'px';
            settingsContainer.style.top = (e.clientY - offsetY) + 'px';
        }

        function stopDrag() {
            isDragging = false;
            document.removeEventListener('mousemove', elementDrag);
            document.removeEventListener('mouseup', stopDrag);
        }

        // 
        function loadContent(url) {
            document.getElementById('portal-ui').style.display = 'none';
            document.getElementById('settings-container').style.display = 'none';
            document.getElementById('settings-trigger').style.display = 'none';

            const iframe = document.getElementById('fullscreen-iframe');
            iframe.src = url;
            iframe.style.display = 'block';

            document.getElementById('back-btn').style.display = 'block';
        }

        // 
        function goHome() {
            document.getElementById('portal-ui').style.display = 'flex';
            document.getElementById('settings-trigger').style.display = 'block';

            const iframe = document.getElementById('fullscreen-iframe');
            iframe.src = '';
            iframe.style.display = 'none';

            document.getElementById('back-btn').style.display = 'none';
        }
    </script>

</body>
</html>
